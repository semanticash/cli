name: CI (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  windows:
    name: Windows
    runs-on: windows-latest
    env:
      # Use a workspace-local temp dir for Go build artifacts.
      # The system temp dir on Windows is scanned by Defender, which
      # locks test binaries briefly after execution and causes
      # "Access is denied" errors during cleanup.
      GOTMPDIR: ${{ github.workspace }}\.gotmp
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Create Go temp dir
        run: mkdir -p $env:GOTMPDIR

      - name: Build (compilation gate)
        run: go build ./...

      - name: Fast tests (runtime correctness)
        run: go test -short ./... -count=1

      - name: Integration tests (locking, detachment, concurrency)
        run: go test -run "Integration|CrossProcess|Stress|E2E" ./... -count=1 -timeout 5m
