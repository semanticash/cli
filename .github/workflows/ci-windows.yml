name: CI (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build (compilation gate)
        run: go build ./...

      - name: Fast tests (runtime correctness)
        shell: bash
        run: |
          set +e
          go test -short ./... -count=1 2>&1 | tee test-output.txt
          # Check for actual test failures, not Go toolchain cleanup errors.
          if grep -q "^--- FAIL:" test-output.txt; then
            exit 1
          fi

      - name: Integration tests (locking, detachment, concurrency)
        shell: bash
        run: |
          set +e
          go test -run "Integration|CrossProcess|Stress|E2E" ./... -count=1 -timeout 5m 2>&1 | tee test-output.txt
          if grep -q "^--- FAIL:" test-output.txt; then
            exit 1
          fi
