name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" 'BEGIN{header="^## \\[" ver "\\]"} $0 ~ header{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md > "$RUNNER_TEMP/release_notes.md"
          if [ ! -s "$RUNNER_TEMP/release_notes.md" ]; then
            echo "::error::No changelog entry found for version ${VERSION} in CHANGELOG.md"
            exit 1
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --release-notes=${{ runner.temp }}/release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}

      - name: Notify Discord
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          CHANGELOG=$(cat "$RUNNER_TEMP/release_notes.md" | head -c 1500)

          # Escape special JSON characters.
          CHANGELOG_ESCAPED=$(printf '%s' "$CHANGELOG" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')

          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @- <<PAYLOAD
          {
            "embeds": [{
              "title": "Semantica CLI ${VERSION} released",
              "url": "https://github.com/semanticash/cli/releases/tag/${VERSION}",
              "color": 5814783,
              "description": ${CHANGELOG_ESCAPED},
              "fields": [
                {
                  "name": "Install / Update",
                  "value": "\`\`\`sh\ncurl -fsSL https://semantica.sh/install.sh | sh\n\`\`\`"
                },
                {
                  "name": "Homebrew",
                  "value": "\`\`\`sh\nbrew upgrade semanticash/tap/semantica\n\`\`\`"
                }
              ]
            }]
          }
          PAYLOAD
